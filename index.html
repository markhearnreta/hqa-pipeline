  .chart-wrap{background:#1e293b;border-radius:12px;padding:18px;overflow-x:auto;margin-bottom:16px}
  .date-axis{position:relative;height:20px;margin-left:190px;margin-bottom:5px}
  .date-tick{position:absolute;font-size:0.65rem;color:#64748b;transform:translateX(-50%);white-space:nowrap}
  .today-label{position:absolute;font-size:0.65rem;color:#fbbf24;font-weight:600;transform:translateX(-50%);white-space:nowrap}
  .gantt-row{display:flex;align-items:center;margin-bottom:8px;cursor:pointer}

  .bar .progress-stripe{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,0.15);border-radius:5px 0 0 5px}
  .bar .stage-dots{position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);display:flex;justify-content:space-around;padding:0 2px;z-index:2;font-size:0.5rem}
  .bar .dot{width:4px;height:4px;background:rgba(255,255,255,0.4);border-radius:50%}
  .today-line{position:absolute;top:-3px;bottom:-3px;width:2px;background:#fbbf24;z-index:10;border-radius:1px}
  .flag-overdue .bar{outline:2px solid #ef4444}
  .flag-urgent .bar{outline:2px solid #f59e0b}

  .note-badge{position:absolute;right:-28px;top:50%;transform:translateY(-50%);font-size:0.65rem;color:#94a3b8;white-space:nowrap;pointer-events:none}

  /* Hover tooltip for notes — desktop only */
  .notes-tip{position:fixed;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:10px 14px;font-size:0.75rem;pointer-events:none;z-index:2000;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,0.6);display:none;line-height:1.5}
  .notes-tip .nt-addr{font-weight:600;color:#7dd3fc;margin-bottom:6px;font-size:0.8rem}
  .notes-tip .nt-entry{color:#cbd5e1;border-left:2px solid #334155;padding-left:8px;margin-bottom:4px}
  .notes-tip .nt-empty{color:#64748b;font-style:italic}

  .panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none}
  .panel{position:fixed;right:0;top:0;bottom:0;width:min(420px,100vw);background:#1e293b;z-index:501;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.25s ease;box-shadow:-4px 0 24px rgba(0,0,0,0.5)}

  .panel-section{margin-bottom:20px}

  /* Stage bar in panel */

  .stage-pip{flex:1;min-width:18px;height:6px;border-radius:3px;background:#1e3a5f;transition:background 0.2s}
  .stage-pip.done{background:#3b82f6}
  .stage-pip.current{background:#fbbf24}

  /* Action buttons */
  .btn-row{display:flex;gap:8px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:6px;font-size:0.75rem;font-weight:500;text-decoration:none;border:none;cursor:pointer;transition:filter 0.15s;white-space:nowrap}
  .btn:hover{filter:brightness(1.15)}
  .btn-advance{background:#3b82f6;color:#fff}
  .btn-note{background:#334155;color:#e2e8f0}
  .btn-due{background:#334155;color:#e2e8f0}
  .btn-archive{background:#334155;color:#e2e8f0}
  .btn-disabled{background:#1e293b;color:#475569;cursor:not-allowed;opacity:0.5}

  /* Checklist */
  .cl-item{display:flex;align-items:flex-start;gap:8px;padding:5px 0;border-bottom:1px solid #1e293b;font-size:0.78rem}
  .cl-item:last-child{border-bottom:none}
  .cl-check{width:16px;height:16px;border-radius:3px;border:1px solid #475569;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#10b981;cursor:pointer;transition:all 0.2s}
  .cl-check.done{background:#10b981;border-color:#10b981;color:#fff}
  .cl-check:hover{background:#1e3a5f;border-color:#3b82f6}
  .cl-text{flex:1;color:#cbd5e1;line-height:1.4}

  /* Notes list */

  .note-entry:last-child{margin-bottom:0}
  .no-notes{font-size:0.75rem;color:#475569;font-style:italic}

  /* Date picker row */
  .due-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  .archive-row input[type=checkbox]{width:16px;height:16px;cursor:pointer}
  .archive-row label{flex:1;font-size:0.78rem;color:#cbd5e1;cursor:pointer}
</style>

async function postUpdate(type, address, value, btn) {
  const origText = btn.textContent;
  btn.textContent = '⏳';
  btn.style.pointerEvents = 'none';
  try {
    const res = await fetch(WEBHOOK_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-HQA-Token': WEBHOOK_TOKEN,
      },
      body: JSON.stringify({ type, address, value }),
    });
    const data = await res.json();
    if (data.ok) {
      btn.textContent = '✅';
      btn.style.background = '#10b981';
      showToast(data.message);
      setTimeout(() => location.reload(), 2500);
    } else {
      btn.textContent = '❌ ' + (data.error || 'Error');
      btn.style.background = '#ef4444';
      btn.style.pointerEvents = 'auto';
    }
  } catch (e) {
    btn.textContent = origText;
    btn.style.pointerEvents = 'auto';
    showToast('Webhook unreachable — make sure you are on Tailscale');
    return false;
  }
  return true;

  const flagClass   = o.cancelled ? 'flag-cancelled' : hasOverdue ? 'flag-overdue' : hasUrgent ? 'flag-urgent' : '';

  row.addEventListener('click', () => openPanel(i));

  });
  row.addEventListener('mousemove', e => {
    tip.style.left = (e.clientX + 16) + 'px';
    tip.style.top  = (e.clientY - 10) + 'px';
  });
  row.addEventListener('mouseleave', () => {

    tip.style.display = 'none';
  });

function showTip(o, e) {
  document.getElementById('nt-addr').textContent = o.addr + ' — ' + o.stage;
  const body = document.getElementById('nt-body');
  body.innerHTML = '';
  if (!o.notes || o.notes.length === 0) {
    body.innerHTML = '<div class="nt-empty">No notes recorded.</div>';
  } else {
    o.notes.forEach(n => {
      const d = document.createElement('div');
      d.className = 'nt-entry';
      d.textContent = n;
      body.appendChild(d);
    });
  }
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 16) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}

const overlay = document.getElementById('overlay');

function openPanel(idx) {
  const o = orders[idx];

  document.getElementById('ph-addr').textContent = o.addr;
  document.getElementById('ph-meta').textContent = o.client + (o.jobType ? '  ·  ' + o.jobType : '');

  // Show archive section if Complete
  const archiveSection = document.getElementById('sec-archive');
  if (o.stage === 'Complete') {
    archiveSection.style.display = 'block';
  } else {
    archiveSection.style.display = 'none';
  }

  // Stage track
  const track = document.getElementById('stage-track');
  track.innerHTML = '';
  STAGES.forEach((s, i) => {
    const pip = document.createElement('div');
    const si  = STAGES.indexOf(o.stage);
    pip.className = 'stage-pip' + (i < si ? ' done' : i === si ? ' current' : '');
    pip.title = s;
    track.appendChild(pip);
  });
  document.getElementById('stage-label').textContent = o.stage + (o.nextStage ? '  →  next: ' + o.nextStage : '  (final stage)');

  // Advance button
  const btnAdv = document.getElementById('btn-advance');
  if (o.cancelled) {
    btnAdv.removeAttribute('href');
    btnAdv.onclick = null;
    btnAdv.className = 'btn btn-disabled';
    btnAdv.textContent = '🚫 Order cancelled';
  } else if (o.nextStage) {
    btnAdv.className = 'btn btn-advance';
    btnAdv.textContent = '⬆ Advance to ' + o.nextStage;
    btnAdv.removeAttribute('href');
    btnAdv.onclick = async (e) => {
      e.preventDefault();
      const btn = e.target;
      await postUpdate('advance', o.fullAddr, '', btn);
    };
  } else {
    btnAdv.removeAttribute('href');
    btnAdv.onclick = null;
    btnAdv.className = 'btn btn-disabled';
    btnAdv.textContent = '⬆ Final stage reached';
  }

  // Cancel button
  const btnCancel = document.getElementById('btn-cancel');
  if (o.cancelled) {
    btnCancel.style.display = 'none';
  } else {
    btnCancel.style.display = '';
    btnCancel.onclick = async (e) => {
      e.preventDefault();
      const reason = prompt('Reason for cancellation (optional):') ?? '';
      if (reason === null) return; 
      await postUpdate('cancel', o.fullAddr, reason, btnCancel);
    };
  }

  // Due date
  const dueDisp = document.getElementById('due-display');
  dueDisp.textContent = o.due || 'No due date set';
  dueDisp.className = 'due-display' + (o.flags.includes('OVERDUE') ? ' overdue' : o.flags.includes('URGENT') ? ' urgent' : '');

  const picker = document.getElementById('due-picker');
  picker.value = o.dueIso || '';
  const btnDue = document.getElementById('btn-due');
  btnDue.removeAttribute('href');
  btnDue.onclick = async (e) => {
    e.preventDefault();
    const v = picker.value;
    if (!v) { showToast('Pick a date first'); return; }
    await postUpdate('due', o.fullAddr, v, btnDue);
  };

  // Archive checkbox
  const archiveCheck = document.getElementById('archive-checkbox');
  archiveCheck.checked = false;
  archiveCheck.onchange = async (e) => {
    if (e.target.checked) {
      const btn = document.createElement('button');
      btn.textContent = 'Archiving...';
      btn.style.display = 'none';
      await postUpdate('cancel', o.fullAddr, '', btn);
    }
  };

  // Checklist
  const clBody = document.getElementById('checklist-body');
  clBody.innerHTML = '';
  (o.checklist || []).forEach(item => {
    const div = document.createElement('div');
    div.className = 'cl-item';
    const chk = document.createElement('div');
    chk.className = 'cl-check' + (item.checked ? ' done' : '');
    chk.textContent = item.checked ? '✓' : '';
    chk.style.cursor = 'pointer';
    
    // Make checkbox directly clickable
    chk.onclick = async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const btn = document.createElement('button');
      btn.style.display = 'none';
      const action = item.checked ? 'uncheck' : 'check';
      await postUpdate(action, o.fullAddr, item.text, btn);
    };

    const txt = document.createElement('div');
    txt.className = 'cl-text' + (item.checked ? ' done' : '');
    txt.textContent = item.text;
    
    div.appendChild(chk);
    div.appendChild(txt);
    clBody.appendChild(div);
  });

  // Notes — populate first so they're visible at top of panel scroll
  const notesBody = document.getElementById('notes-body');
  notesBody.innerHTML = '';
  const noteCount = (o.notes || []).length;
  document.getElementById('notes-section-header').textContent =
    noteCount ? `Notes / Flags  (${noteCount})` : 'Notes / Flags';
  if (noteCount === 0) {
    notesBody.innerHTML = '<div class="no-notes">No notes recorded.</div>';
  } else {
    o.notes.forEach(n => {
      const d = document.createElement('div');
      d.className = 'note-entry';
      d.textContent = n;
      notesBody.appendChild(d);
    });
  }

  // Add note button
  const btnNote = document.getElementById('btn-note');
  btnNote.removeAttribute('href');

  // Inject note input if not present
  let noteInput = document.getElementById('note-input');
  if (!noteInput) {
    noteInput = document.createElement('input');
    noteInput.id = 'note-input';
    noteInput.type = 'text';
    noteInput.placeholder = 'Type note here…';
    noteInput.style.cssText = 'flex:1;background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:5px;padding:6px 10px;font-size:0.75rem;outline:none;min-width:0';
    btnNote.parentNode.insertBefore(noteInput, btnNote);
  }
  noteInput.value = '';

  btnNote.textContent = '✏️ Add note';
  btnNote.onclick = async (e) => {
    e.preventDefault();
    const val = noteInput.value.trim();
    if (!val) { showToast('Type a note first'); return; }
    await postUpdate('note', o.fullAddr, val, btnNote);
  };

  // Open panel
  panel.classList.add('open');
  overlay.style.display = 'block';
}

function closePanel() {
  panel.classList.remove('open');
  overlay.style.display = 'none';
}

document.getElementById('panel-close').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', closePanel);
</script>
</body>
</html>
