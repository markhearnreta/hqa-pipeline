<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HQA Pipeline — May 20, 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          background: #0f172a; color: #e2e8f0; padding: 24px; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; color: #f1f5f9; }
  .subtitle { font-size: 0.8rem; color: #94a3b8; margin-bottom: 24px; }
  .legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: #cbd5e1; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .chart-wrap { background: #1e293b; border-radius: 12px; padding: 20px; overflow-x: auto; }
  .date-axis { position: relative; height: 22px; margin-left: 200px; margin-bottom: 6px; }
  .date-tick { position: absolute; font-size: 0.68rem; color: #64748b;
                transform: translateX(-50%); white-space: nowrap; }
  .today-label { position: absolute; font-size: 0.68rem; color: #fbbf24; font-weight: 600;
                  transform: translateX(-50%); white-space: nowrap; }
  .gantt-row { display: flex; align-items: center; margin-bottom: 10px; }
  .row-label { width: 200px; min-width: 200px; padding-right: 12px; font-size: 0.78rem;
                text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row-label .addr { color: #f1f5f9; font-weight: 500; }
  .row-label .meta { color: #64748b; font-size: 0.68rem; }
  .row-track { flex: 1; position: relative; height: 34px; background: #0f172a;
                border-radius: 6px; overflow: visible; }
  .bar { position: absolute; height: 28px; top: 3px; border-radius: 6px;
          display: flex; align-items: center; padding: 0 8px; font-size: 0.72rem;
          font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden;
          cursor: pointer; transition: filter 0.15s; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .bar:hover { filter: brightness(1.2); }
  .bar .progress-stripe { position: absolute; left: 0; top: 0; bottom: 0;
                            background: rgba(255,255,255,0.15); border-radius: 6px 0 0 6px; }
  .today-line { position: absolute; top: -4px; bottom: -4px; width: 2px;
                 background: #fbbf24; z-index: 10; border-radius: 1px; }
  .due-marker { position: absolute; top: 3px; height: 28px; width: 3px;
                 background: rgba(255,255,255,0.35); border-radius: 2px; z-index: 5; }
  .flag-overdue .bar { outline: 2px solid #ef4444; }
  .flag-urgent .bar  { outline: 2px solid #f59e0b; }
  .tooltip { position: fixed; background: #1e293b; border: 1px solid #334155;
              border-radius: 8px; padding: 10px 14px; font-size: 0.78rem; pointer-events: none;
              z-index: 1000; max-width: 260px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
              display: none; }
  .tooltip .t-addr { font-weight: 600; color: #f1f5f9; margin-bottom: 4px; }
  .tooltip .t-row  { color: #94a3b8; margin-top: 2px; }
  .tooltip .t-flag { color: #fbbf24; font-weight: 600; margin-top: 4px; }
</style>
</head>
<body>
<h1>HQA Order Pipeline</h1>
<div class="subtitle">Updated May 20, 2026 — 3 active orders</div>

<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#6b7280"></div>Intake</div><div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>Inspection Scheduled</div><div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>Inspection Done</div><div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>Comp Research</div><div class="legend-item"><div class="legend-dot" style="background:#f97316"></div>Drafting</div><div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>QC Review</div><div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>Delivered</div><div class="legend-item"><div class="legend-dot" style="background:#059669"></div>Invoiced</div><div class="legend-item"><div class="legend-dot" style="background:#1d4ed8"></div>Complete</div>
</div>

<div class="chart-wrap">
  <div id="date-axis" class="date-axis"></div>
  <div id="gantt"></div>
</div>

<div class="tooltip" id="tooltip">
  <div class="t-addr" id="tt-addr"></div>
  <div class="t-row" id="tt-client"></div>
  <div class="t-row" id="tt-stage"></div>
  <div class="t-row" id="tt-due"></div>
  <div class="t-flag" id="tt-flag"></div>
</div>

<script>
const orders = [
    {
            addr: '4738 Emerald Ave', client: 'No AMC', stage: 'Comp Research',
            due: 'May 22', flags: 'URGENT', color: '#f59e0b',
            pctStart: 0.00, pctWidth: 45.45,
            progress: 38, todayPct: 27.27
        },
            {
            addr: '11022 Ranch Dr', client: 'Banner Bank', stage: 'Comp Research',
            due: 'May 25', flags: 'On track', color: '#f59e0b',
            pctStart: 9.09, pctWidth: 63.64,
            progress: 38, todayPct: 27.27
        },
            {
            addr: '152 Park Avenue', client: 'Karen R. Holt', stage: 'Comp Research',
            due: 'May 25', flags: 'On track', color: '#f59e0b',
            pctStart: 9.09, pctWidth: 63.64,
            progress: 38, todayPct: 27.27
        }
];
const ticks = [{pct: 0.0, label: 'May 17'}, {pct: 63.6, label: 'May 24'}];
const todayPct = 27.27;

// Render date axis
const axis = document.getElementById('date-axis');
ticks.forEach(t => {
    const el = document.createElement('div');
    el.className = 'date-tick';
    el.style.left = t.pct + '%';
    el.textContent = t.label;
    axis.appendChild(el);
});
// Today label on axis
const todayEl = document.createElement('div');
todayEl.className = 'today-label';
todayEl.style.left = todayPct + '%';
todayEl.textContent = 'Today';
axis.appendChild(todayEl);

// Render gantt rows
const gantt = document.getElementById('gantt');
const tt = document.getElementById('tooltip');

orders.forEach((o, i) => {
    const hasOverdue = o.flags.includes('OVERDUE');
    const hasUrgent  = o.flags.includes('URGENT');
    const flagClass  = hasOverdue ? 'flag-overdue' : hasUrgent ? 'flag-urgent' : '';

    const row = document.createElement('div');
    row.className = 'gantt-row ' + flagClass;

    row.innerHTML = `
      <div class="row-label">
        <div class="addr">${o.addr}</div>
        <div class="meta">${o.client}</div>
      </div>
      <div class="row-track">
        <div class="today-line" style="left:${o.todayPct}%"></div>
        <div class="bar" style="left:${o.pctStart}%;width:${o.pctWidth}%;background:${o.color}"
             data-idx="${i}">
          <div class="progress-stripe" style="width:${o.progress}%"></div>
          <span style="position:relative;z-index:1">${o.stage}</span>
        </div>
      </div>`;
    gantt.appendChild(row);

    const bar = row.querySelector('.bar');
    bar.addEventListener('mousemove', e => {
        document.getElementById('tt-addr').textContent   = o.addr;
        document.getElementById('tt-client').textContent = 'Client: ' + o.client;
        document.getElementById('tt-stage').textContent  = 'Stage: ' + o.stage + ' (' + o.progress + '% through pipeline)';
        document.getElementById('tt-due').textContent    = 'Due: ' + o.due;
        document.getElementById('tt-flag').textContent   = o.flags !== 'On track' ? '⚠ ' + o.flags : '';
        tt.style.display = 'block';
        tt.style.left = (e.clientX + 14) + 'px';
        tt.style.top  = (e.clientY - 10) + 'px';
    });
    bar.addEventListener('mouseleave', () => { tt.style.display = 'none'; });
});
</script>
</body>
</html>
